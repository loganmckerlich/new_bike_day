# Strava API credentials
# Create an app at https://www.strava.com/settings/api
STRAVA_CLIENT_ID = ""
STRAVA_CLIENT_SECRET = ""
STRAVA_REDIRECT_URI = "http://localhost:8501/"

# Optional: Access token for pre-authenticated requests
# Used by the "Reload Activities" button without requiring re-authorization
STRAVA_ACCESS_TOKEN = ""

# Webhook verify token — set the same value in the webhook server environment
# (STRAVA_WEBHOOK_VERIFY_TOKEN).  This is a secret you choose; Strava will
# echo it back during subscription verification.
STRAVA_WEBHOOK_VERIFY_TOKEN = ""

# Supabase credentials
# Find these in your Supabase project under Settings → API
SUPABASE_URL = ""
SUPABASE_KEY = ""

STRAVA_DEMO_REFRESH_TOKEN = "your_refresh_token_here"
STRAVA_DEMO_ATHLETE_ID = "your_athlete_id"  # fallback if token response omits it